<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern SaaS Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        :root {
            --primary-900: #1e293b;
            --primary-700: #475569;
            --accent-blue: #0ea5e9;
            --accent-emerald: #10b981;
            --text-primary: var(--primary-900);
            --text-secondary: var(--primary-700);
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 8px;
            --transition: all 0.2s ease-in-out;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --text-primary: #f8fafc;
                --text-secondary: #cbd5e1;
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --bg-tertiary: #334155;
                --border-color: #475569;
            }
        }

        .dark-mode {
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --border-color: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            transition: var(--transition);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }

        a:hover, a:focus {
            color: var(--accent-emerald);
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: var(--radius);
            transition: var(--transition);
            font-weight: 500;
        }

        button:focus {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .grid {
            display: grid;
            gap: 24px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        /* Header Styles */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        .nav-menu {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-link:hover, .nav-link:focus {
            color: var(--text-primary);
        }

        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 8px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
        }

        .user-menu.active .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: block;
            padding: 8px 12px;
            color: var(--text-primary);
            border-radius: 4px;
        }

        .dropdown-item:hover, .dropdown-item:focus {
            background: var(--bg-tertiary);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 73px;
            height: calc(100vh - 73px);
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: var(--transition);
            z-index: 90;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-section {
            margin-bottom: 32px;
        }

        .sidebar-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: var(--text-secondary);
        }

        .sidebar-link:hover, .sidebar-link:focus {
            color: var(--text-primary);
        }

        .sidebar-link.active {
            color: var(--accent-blue);
        }

        /* Main Content */
        .main-content {
            margin-left: 0;
            padding: 24px;
            transition: var(--transition);
        }

        .main-content.sidebar-active {
            margin-left: 280px;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 41, 59, 0.7);
            z-index: -1;
        }

        .hero-content {
            max-width: 800px;
            padding: 0 24px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .cta-button {
            background: var(--accent-emerald);
            color: white;
            padding: 12px 32px;
            font-size: 1.125rem;
            border-radius: var(--radius);
        }

        .cta-button:hover, .cta-button:focus {
            background: #0da271;
            transform: translateY(-2px);
        }

        .logo-grid {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
            margin-top: 48px;
            opacity: 0.7;
        }

        .logo-item {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Features Section */
        .features {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 48px;
        }

        .features-grid {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .feature-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .feature-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-blue);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: white;
        }

        /* Pricing Section */
        .pricing {
            padding: 80px 0;
            background: var(--bg-secondary);
        }

        .pricing-toggle {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 48px;
        }

        .toggle-option {
            padding: 8px 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .toggle-option.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .pricing-grid {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .pricing-card {
            text-align: center;
        }

        .price {
            font-size: 3rem;
            font-weight: 600;
            margin: 24px 0;
        }

        .price-period {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .auth-button {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-button:hover, .auth-button:focus {
            border-color: var(--accent-blue);
        }

        /* Dashboard */
        .dashboard-grid {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .widget {
            min-height: 200px;
            cursor: move;
        }

        .widget-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 16px;
        }

        .widget-title {
            margin: 0;
        }

        .widget-actions {
            display: flex;
            gap: 8px;
        }

        .widget-action {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .role-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .role-admin {
            background: #fef2f2;
            color: #dc2626;
        }

        .role-user {
            background: #f0f9ff;
            color: #0369a1;
        }

        /* Forms */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .payment-form {
            max-width: 500px;
        }

        .card-input {
            position: relative;
        }

        .card-icons {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }

        .card-icon {
            width: 32px;
            height: 20px;
            background: var(--bg-tertiary);
            border-radius: 2px;
        }

        /* Notifications */
        .notification-bell {
            position: relative;
            cursor: pointer;
        }

        .notification-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-emerald);
            color: white;
            font-size: 0.75rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
        }

        .notification-bell.active .notification-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .notification-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item.unread {
            background: var(--bg-tertiary);
        }

        /* File Upload */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-blue);
            background: var(--bg-tertiary);
        }

        .progress-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-emerald);
            transition: width 0.3s ease;
        }

        /* Kanban */
        .kanban-board {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 24px 0;
        }

        .kanban-column {
            min-width: 300px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
        }

        .kanban-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px
